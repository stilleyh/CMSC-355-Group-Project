        <script>

            <!--Adding Notes part-->
            function showContent() {
                document.getElementById("SNote").style.display = "block";
            }

            function toggleContent() {
                const sNote = document.getElementById("SNote");
                sNote.style.display = sNote.style.display === "none" ? "block" : "none";
            }



            window.onload = function () {
                fetch("/patients/load")
                .then(r => r.json())
                .then(data => {
                    console.log("Loaded patients:", data);
                });
            };
            fetch('SideNav.html')
                .then(res => res.text())
                .then(html => {
                    document.getElementById('SideNav').innerHTML = html;
                    initSidebar();
            });

            function initSidebar() {
                $(".sidebar-dropdown > a").click(function () {
                    $(".sidebar-submenu").slideUp(200);
                    if ($(this).parent().hasClass("active")) {
                        $(".sidebar-dropdown").removeClass("active");
                        $(this).parent().removeClass("active");
                    } else {
                        $(".sidebar-dropdown").removeClass("active");
                        $(this).next(".sidebar-submenu").slideDown(200);
                        $(this).parent().addClass("active");
                    }
                });

                $("#close-sidebar").click(function () {
                    $(".page-wrapper").removeClass("toggled");
                });

                $("#show-sidebar").click(function () {
                    $(".page-wrapper").addClass("toggled");
                });
            }
        </script>
