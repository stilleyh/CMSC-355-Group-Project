        <h1>Dashboard</h1>

        <div style="display: flex; align-items: flex-start; gap: 0;">
            <div class="contain" id="TA">
                <h3>Today's appointments: </h3>
            </div>

            <div class="contain" id="PA">
                <h3>Pending appointments: </h3>
            </div>

            <div class="contain" id="CA">
                <h3>Completed appointments: </h3>
            </div>

            <div class="contain" id="NoteAdd">
                <label>Add a Note: </label>
                <br>
                <button onclick="toggleContent()">Note</button>
                <div id="SNote" style="display: none;">
                    <textarea id="Note"></textarea>
                    <button onclick="toggleContent()">Submit</button>
                </div>
            </div>
        </div>

        <div class="contain2" id="Tappoint">
            <div class="EnterInfo" id="PatientInfo">
                <label>Patient Name</label>
            </div>
            <div class="EnterInfo" id="TimeInfo">
                <label>Time</label>
            </div>
            <div class="EnterInfo" id="StatusInfo">
                <label>Status</label>
            </div>
            <div class="EnterInfo" id="ActionInfo">
                <label>Action</label>
     
            </div> 
        </div>

         
    




        <script>

            <!--Adding Notes part-->
            function showContent() {
                document.getElementById("SNote").style.display = "block";
            }

            function toggleContent() {
                const sNote = document.getElementById("SNote");
                sNote.style.display = sNote.style.display === "none" ? "block" : "none";
            }



            window.onload = function () {
                fetch("/patients/load")
                    .then(r => r.json())
                    .then(data => {
                        console.log("Loaded patients:", data);
                    });

                fetch("/appointments/load")
                    .then(r => r.json())
                    .then(data => {
                        console.log("Loaded appointments:", data);
                    });

                fetch("/staff/load")
                    .then(r => r.json())
                    .then(data => {
                        console.log("Loaded staff:", data);
                    });
            };
                        initSidebar();

            function initSidebar() {
                $(".sidebar-dropdown > a").click(function () {
                    $(".sidebar-submenu").slideUp(200);
                    if ($(this).parent().hasClass("active")) {
                        $(".sidebar-dropdown").removeClass("active");
                        $(this).parent().removeClass("active");
                    } else {
                        $(".sidebar-dropdown").removeClass("active");
                        $(this).next(".sidebar-submenu").slideDown(200);
                        $(this).parent().addClass("active");
                    }
                });

                $("#close-sidebar").click(function () {
                    $(".page-wrapper").removeClass("toggled");
                });

                $("#show-sidebar").click(function () {
                    $(".page-wrapper").addClass("toggled");
                });
            }


        </script>
