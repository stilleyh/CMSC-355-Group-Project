<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Dashboard-staff view">
    <title>List of Patients</title>

    <link rel="stylesheet" href="css/LOPAS.css">
    <link rel="stylesheet" href="css/sidenav.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        .patient-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr;
            padding: 8px;
            border-bottom: 1px solid #ddd;
        }

        .patient-header {
            font-weight: bold;
            background: #f5f5f5;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>List of Patients</h1>
        <input class="searchbar" type="text" placeholder="Search...">
    </div>

    <br>

    <!-- Header Row -->
    <div class="patient-row patient-header">
        <div>First Name</div>
        <div>Middle Name</div>
        <div>Last Name</div>
        <div>Patient ID</div>
        <div>Room</div>
        <div>See More</div>
    </div>

    <!-- Data will be injected here -->
    <div id="patient-list"></div>

    <script>
        function renderPatients(data) {
            const container = document.getElementById("patient-list");
            container.innerHTML = "";

            Object.values(data).forEach(p => {
                // naive name splitting since your model only stores "name"
                const nameParts = (p.name || "").split(" ");

                const first = nameParts[0] || "";
                const middle = nameParts.length > 2 ? nameParts.slice(1, -1).join(" ") : "";
                const last = nameParts.length > 1 ? nameParts[nameParts.length - 1] : "";

                const row = document.createElement("div");
                row.className = "patient-row";

                row.innerHTML = `
                    <div>${first}</div>
                    <div>${middle}</div>
                    <div>${last}</div>
                    <div>${p.patient_id}</div>
                    <div>${p.room || "-"}</div>
                    <div><button class="btn btn-sm btn-primary">View</button></div>
                `;

                container.appendChild(row);
            });
        }

        window.onload = function () {
            fetch("/patients/load")
                .then(r => r.json())
                .then(data => {
                    console.log("Loaded patients:", data);
                    renderPatients(data);
                })
                .catch(err => console.error("Failed to load patients:", err));
        };
    </script>

</body>

</html>
